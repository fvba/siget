<!doctype html>
<html>
  <head>
    <title>SIGET</title>
  </head>
  <body>
    <h1>Sistema de Gestão de Eventos de Tráfego</h1>

    <a href="/cadastrar_evento">Cadastrar Evento</a><br />
    <a href="/cadastrar_interdicao">Cadastrar Interdição</a>

    <ul>

      {% endfor %}
    </ul>
  </body>
</html>
